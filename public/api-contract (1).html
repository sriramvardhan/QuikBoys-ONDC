<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ONDC LSP API Contract v1.2.0</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',sans-serif;background:#0A0A0A;color:#E8E8E8;min-height:100vh;padding:2rem}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:8px}
.logo-row{display:flex;align-items:center;gap:12px}
.logo-mark{width:36px;height:36px;background:#FF6B00;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;color:white}
.logo-text{font-size:13px;color:#888;letter-spacing:0.08em;text-transform:uppercase;font-family:'DM Mono',monospace}
.version-badge{font-size:11px;font-family:'DM Mono',monospace;padding:4px 12px;border-radius:8px;background:rgba(56,138,221,0.1);color:#85B7EB;border:1px solid rgba(56,138,221,0.2)}
.phase-tabs{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.ptab{font-size:12px;padding:5px 16px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);cursor:pointer;background:transparent;color:#888;font-family:'Sora',sans-serif}
.ptab.active{background:#1A1A1A;color:#E8E8E8;border-color:rgba(255,255,255,0.25)}
.api-list{display:flex;flex-direction:column;gap:8px;margin-bottom:1.5rem}
.api-row{display:grid;grid-template-columns:160px 1fr auto;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;border:1px solid rgba(255,255,255,0.07);background:#111;cursor:pointer}
.api-row:hover{border-color:rgba(255,107,0,0.3)}
.api-row.selected{border-color:rgba(255,107,0,0.5);background:#1A1109}
.method-pill{font-family:'DM Mono',monospace;font-size:11px;padding:3px 10px;border-radius:6px;background:rgba(0,200,83,0.1);color:#5DCAA5;border:1px solid rgba(0,200,83,0.2);font-weight:500}
.api-name{font-family:'DM Mono',monospace;font-size:13px;color:#E8E8E8;font-weight:500}
.api-desc{font-size:12px;color:#888;line-height:1.4}
.dir-bap{font-size:11px;padding:3px 10px;border-radius:6px;font-family:'DM Mono',monospace;white-space:nowrap;background:rgba(239,159,39,0.1);color:#EF9F27;border:1px solid rgba(239,159,39,0.2)}
.detail-panel{background:#111;border:1px solid rgba(255,255,255,0.07);border-radius:14px;overflow:hidden}
.detail-header{padding:14px 18px;border-bottom:1px solid rgba(255,255,255,0.07);background:#1A1A1A;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.detail-title{font-size:14px;font-weight:500;color:#E8E8E8;font-family:'DM Mono',monospace}
.detail-desc{font-size:12px;color:#888;margin-top:3px}
.payload-tabs{display:flex;gap:4px;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,0.07);background:#1A1A1A;flex-wrap:wrap}
.ptab2{font-size:12px;padding:4px 12px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);cursor:pointer;background:transparent;color:#888;font-family:'Sora',sans-serif}
.ptab2.active{background:#111;color:#E8E8E8;border-color:rgba(255,255,255,0.25)}
.copy-btn{font-size:12px;padding:4px 12px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);cursor:pointer;background:transparent;color:#888;font-family:'Sora',sans-serif;margin-left:auto}
.copy-btn:hover{background:#1A1A1A;color:#E8E8E8}
.json-view{padding:16px 18px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.8;color:#E8E8E8;white-space:pre;overflow:auto;max-height:420px}
.k{color:#85B7EB}.s{color:#97C459}.n{color:#EF9F27}.b{color:#ED93B1}.p{color:#555}
.attrs-table{width:100%;border-collapse:collapse;font-size:12px}
.attrs-table th{text-align:left;padding:10px 14px;font-weight:500;color:#888;font-size:11px;border-bottom:1px solid rgba(255,255,255,0.07);background:#1A1A1A;text-transform:uppercase;letter-spacing:0.05em}
.attrs-table td{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.05);color:#E8E8E8;vertical-align:top}
.req-tag{font-size:10px;padding:2px 7px;border-radius:4px;background:rgba(226,75,74,0.15);color:#F09595;font-family:'DM Mono',monospace}
.opt-tag{font-size:10px;padding:2px 7px;border-radius:4px;background:rgba(255,255,255,0.07);color:#888;font-family:'DM Mono',monospace}
.empty{padding:3rem;text-align:center;color:#555;font-size:13px}
</style>
</head>
<body>
<div class="top-bar">
  <div class="logo-row">
    <div class="logo-mark">OND</div>
    <span class="logo-text">ONDC LSP API Contract</span>
  </div>
  <span class="version-badge">v1.2.0</span>
</div>
<div class="phase-tabs" id="phaseTabs"></div>
<div class="api-list" id="apiList"></div>
<div class="detail-panel" id="detailPanel"><div class="empty">Select an API above to view payload</div></div>
<script>
const apis = {
  "pre-order": [
    {
      id:"search",method:"POST",name:"/search",
      desc:"Buyer NP specifies the search intent for logistics",
      req:{context:{domain:"nic2004:60232",action:"search",country:"IND",city:"std:080",core_version:"1.2.0",bap_id:"buyer-app.ondc.org",bpp_id:"lsp.ondc.org",transaction_id:"txn-001",message_id:"msg-001",timestamp:"2024-06-01T10:00:00.000Z",ttl:"PT30S"},message:{intent:{fulfillment:{type:"Delivery",start:{location:{gps:"12.9716,77.5946",address:{area_code:"560102"}}},end:{location:{gps:"12.9352,77.6245",address:{area_code:"560008"}}}},payment:{"@ondc/org/buyer_app_finder_fee_type":"percent","@ondc/org/buyer_app_finder_fee_amount":"3"}}}},
      res:{context:{domain:"nic2004:60232",action:"on_search",core_version:"1.2.0",transaction_id:"txn-001",message_id:"msg-002",timestamp:"2024-06-01T10:00:01.000Z"},message:{catalog:{"bpp/descriptor":{name:"QuikBoys LSP"},"bpp/providers":[{id:"lsp-001",descriptor:{name:"QuikBoys Logistics"},items:[{id:"standard-delivery",descriptor:{name:"Standard Delivery"},fulfillment_id:"ff-001",price:{currency:"INR",value:"75.00"}}]}]}}},
      attrs:[{k:"context.domain",t:"string",r:true,d:"nic2004:60232 for logistics"},{k:"message.intent.fulfillment.type",t:"string",r:true,d:"Delivery or Return"},{k:"message.intent.fulfillment.start.location.gps",t:"string",r:true,d:"Pickup GPS"},{k:"message.intent.fulfillment.end.location.gps",t:"string",r:true,d:"Drop GPS"},{k:"message.intent.payment",t:"object",r:false,d:"Finder fee config"}]
    },
    {
      id:"init",method:"POST",name:"/init",
      desc:"Buyer and seller NP agree to terms prior to placing order",
      req:{context:{domain:"nic2004:60232",action:"init",core_version:"1.2.0",bap_id:"buyer-app.ondc.org",bpp_id:"lsp.ondc.org",transaction_id:"txn-001",message_id:"msg-003",timestamp:"2024-06-01T10:01:00.000Z",ttl:"PT30S"},message:{order:{provider:{id:"lsp-001"},items:[{id:"standard-delivery",fulfillment_id:"ff-001",quantity:{count:1}}],billing:{name:"Ravi Kumar",address:{door:"12",street:"MG Road",city:"Bengaluru",state:"Karnataka",country:"IND",area_code:"560008"},email:"ravi@example.com",phone:"+919876543210"},fulfillments:[{id:"ff-001",type:"Delivery",start:{location:{gps:"12.9716,77.5946"},contact:{phone:"+919876500001"}},end:{location:{gps:"12.9352,77.6245"},contact:{phone:"+919876543210"}}}],payment:{type:"ON-FULFILLMENT",collected_by:"BPP"}}}},
      res:{context:{domain:"nic2004:60232",action:"on_init",core_version:"1.2.0",transaction_id:"txn-001",message_id:"msg-004",timestamp:"2024-06-01T10:01:01.000Z"},message:{order:{provider:{id:"lsp-001"},quote:{price:{currency:"INR",value:"75.00"},breakup:[{title:"Base charge",price:{currency:"INR",value:"60.00"}},{title:"CGST 9%",price:{currency:"INR",value:"6.75"}},{title:"SGST 9%",price:{currency:"INR",value:"6.75"}}],ttl:"P1D"},fulfillments:[{id:"ff-001",type:"Delivery",start:{time:{range:{start:"2024-06-01T12:00:00.000Z",end:"2024-06-01T14:00:00.000Z"}}},end:{time:{range:{start:"2024-06-01T16:00:00.000Z",end:"2024-06-01T18:00:00.000Z"}}}}],payment:{type:"ON-FULFILLMENT",collected_by:"BPP"},tags:[{code:"bpp_terms",list:[{code:"max_liability",value:"2"},{code:"court_jurisdiction",value:"Hyderabad"}]}]}}},
      attrs:[{k:"message.order.billing",t:"object",r:true,d:"Complete billing details"},{k:"message.order.fulfillments[].start.location",t:"object",r:true,d:"Pickup location"},{k:"message.order.fulfillments[].end.location",t:"object",r:true,d:"Drop location"},{k:"message.order.payment.type",t:"string",r:true,d:"ON-FULFILLMENT or PRE-FULFILLMENT"}]
    },
    {
      id:"confirm",method:"POST",name:"/confirm",
      desc:"Buyer NP places the order on behalf of the buyer",
      req:{context:{domain:"nic2004:60232",action:"confirm",core_version:"1.2.0",transaction_id:"txn-001",message_id:"msg-005",timestamp:"2024-06-01T10:02:00.000Z"},message:{order:{id:"order-001",state:"Created",provider:{id:"lsp-001"},items:[{id:"standard-delivery",fulfillment_id:"ff-001",quantity:{count:1}}],billing:{name:"Ravi Kumar",address:{door:"12",street:"MG Road",city:"Bengaluru",area_code:"560008"},phone:"+919876543210"},fulfillments:[{id:"ff-001",type:"Delivery",start:{location:{gps:"12.9716,77.5946"},contact:{phone:"+919876500001"}},end:{location:{gps:"12.9352,77.6245"},contact:{phone:"+919876543210"}}}],quote:{price:{currency:"INR",value:"75.00"}},payment:{type:"ON-FULFILLMENT",collected_by:"BPP",status:"NOT-PAID"}}}},
      res:{context:{domain:"nic2004:60232",action:"on_confirm",core_version:"1.2.0",transaction_id:"txn-001",message_id:"msg-006",timestamp:"2024-06-01T10:02:01.000Z"},message:{order:{id:"order-001",state:"Accepted",provider:{id:"lsp-001"},fulfillments:[{id:"ff-001",type:"Delivery",state:{descriptor:{code:"Pending"}},tracking:true}],payment:{type:"ON-FULFILLMENT",status:"NOT-PAID"}}}},
      attrs:[{k:"message.order.id",t:"string",r:true,d:"Unique order ID"},{k:"message.order.state",t:"string",r:true,d:"Created"},{k:"message.order.quote.price",t:"object",r:true,d:"Final agreed price"},{k:"message.order.payment.status",t:"string",r:true,d:"NOT-PAID or PAID"}]
    }
  ],
  "post-order": [
    {
      id:"status",method:"POST",name:"/status",
      desc:"Buyer NP requests current status of the order",
      req:{context:{domain:"nic2004:60232",action:"status",core_version:"1.2.0",transaction_id:"txn-001",message_id:"msg-007",timestamp:"2024-06-01T11:00:00.000Z"},message:{order_id:"order-001"}},
      res:{context:{domain:"nic2004:60232",action:"on_status",core_version:"1.2.0",transaction_id:"txn-001",message_id:"msg-008",timestamp:"2024-06-01T11:00:01.000Z"},message:{order:{id:"order-001",state:"In-progress",fulfillments:[{id:"ff-001",state:{descriptor:{code:"Order-picked-up"}},tracking:true}]}}},
      attrs:[{k:"message.order_id",t:"string",r:true,d:"Order ID to query"},{k:"fulfillments[].state.descriptor.code",t:"string",r:true,d:"Current fulfillment state"}]
    },
    {
      id:"cancel",method:"POST",name:"/cancel",
      desc:"Buyer NP places cancellation request for the order",
      req:{context:{domain:"nic2004:60232",action:"cancel",core_version:"1.2.0",transaction_id:"txn-001",message_id:"msg-009",timestamp:"2024-06-01T10:30:00.000Z"},message:{order_id:"order-001",cancellation_reason_id:"001",descriptor:{short_desc:"Order placed by mistake"}}},
      res:{context:{domain:"nic2004:60232",action:"on_cancel",core_version:"1.2.0",transaction_id:"txn-001",message_id:"msg-010",timestamp:"2024-06-01T10:30:01.000Z"},message:{order:{id:"order-001",state:"Cancelled",fulfillments:[{id:"ff-001",state:{descriptor:{code:"Cancelled"}}}]}}},
      attrs:[{k:"message.order_id",t:"string",r:true,d:"Order to cancel"},{k:"message.cancellation_reason_id",t:"string",r:true,d:"Reason code"}]
    },
    {
      id:"update",method:"POST",name:"/update",
      desc:"Buyer NP updates fulfillment details - PCC/DCC/authorization codes",
      req:{context:{domain:"nic2004:60232",action:"update",core_version:"1.2.0",transaction_id:"txn-001",message_id:"msg-011",timestamp:"2024-06-01T14:00:00.000Z"},message:{update_target:"fulfillment",order:{id:"order-001",fulfillments:[{id:"ff-001",tags:[{code:"state",list:[{code:"ready_to_ship",value:"yes"}]}]}]}}},
      res:{context:{domain:"nic2004:60232",action:"on_update",core_version:"1.2.0",transaction_id:"txn-001",message_id:"msg-012",timestamp:"2024-06-01T14:00:01.000Z"},message:{order:{id:"order-001",fulfillments:[{id:"ff-001",state:{descriptor:{code:"Order-picked-up"}}}]}}},
      attrs:[{k:"message.update_target",t:"string",r:true,d:"fulfillment or payment"},{k:"message.order.fulfillments[].tags",t:"array",r:true,d:"PCC, DCC, AWB tags"}]
    },
    {
      id:"track",method:"POST",name:"/track",
      desc:"Buyer NP requests live tracking URL for the order",
      req:{context:{domain:"nic2004:60232",action:"track",core_version:"1.2.0",transaction_id:"txn-001",message_id:"msg-013",timestamp:"2024-06-01T15:00:00.000Z"},message:{order_id:"order-001",callback_url:"https://buyer-app.ondc.org/track/cb"}},
      res:{context:{domain:"nic2004:60232",action:"on_track",core_version:"1.2.0",transaction_id:"txn-001",message_id:"msg-014",timestamp:"2024-06-01T15:00:01.000Z"},message:{tracking:{id:"track-001",url:"https://track.quikboys.in/order-001",status:"active"}}},
      attrs:[{k:"message.order_id",t:"string",r:true,d:"Order to track"},{k:"message.tracking.url",t:"string",r:true,d:"Live tracking URL"},{k:"message.tracking.status",t:"string",r:true,d:"active or inactive"}]
    }
  ]
};

const phases=Object.keys(apis);
let activePhase=phases[0],selectedApi=null,activeTab='req';

function hl(obj){
  return JSON.stringify(obj,null,2)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("[\w@\/\-\.]*")\s*:/g,'<span class="k">$1</span>:')
    .replace(/:\s*(".*?")/g,': <span class="s">$1</span>')
    .replace(/:\s*(\d+\.?\d*)/g,': <span class="n">$1</span>')
    .replace(/:\s*(true|false|null)/g,': <span class="b">$1</span>');
}

function renderPhaseTabs(){
  document.getElementById('phaseTabs').innerHTML=phases.map(p=>
    '<button class="ptab'+(p===activePhase?' active':'')+'" onclick="setPhase(\''+p+'\')">'+p+'</button>'
  ).join('');
}

function renderApiList(){
  document.getElementById('apiList').innerHTML=apis[activePhase].map(a=>
    '<div class="api-row'+(selectedApi&&selectedApi.id===a.id?' selected':'')+'" onclick="selectApi(\''+a.id+'\')">'+
    '<div style="display:flex;align-items:center;gap:8px"><span class="method-pill">'+a.method+'</span><span class="api-name">'+a.name+'</span></div>'+
    '<span class="api-desc">'+a.desc+'</span>'+
    '<span class="dir-bap">BAP &rarr; BPP</span></div>'
  ).join('');
}

function renderDetail(){
  const a=selectedApi;
  if(!a){document.getElementById('detailPanel').innerHTML='<div class="empty">Select an API above to view payload</div>';return;}
  const payload=activeTab==='req'?a.req:a.res;
  let content='';
  if(activeTab==='attrs'){
    content='<div style="overflow:auto"><table class="attrs-table"><thead><tr><th>Key</th><th>Type</th><th>Required</th><th>Description</th></tr></thead><tbody>'+
      a.attrs.map(x=>'<tr><td style="font-family:\'DM Mono\',monospace;color:#85B7EB">'+x.k+'</td><td style="font-family:\'DM Mono\',monospace">'+x.t+'</td><td><span class="'+(x.r?'req-tag':'opt-tag')+'">'+(x.r?'required':'optional')+'</span></td><td style="color:#888">'+x.d+'</td></tr>').join('')+
      '</tbody></table></div>';
  } else {
    content='<div class="json-view">'+hl(payload)+'</div>';
  }
  document.getElementById('detailPanel').innerHTML=
    '<div class="detail-header"><div><div class="detail-title">'+a.name+(activeTab==='res'?' / on_'+a.id:'')+'</div><div class="detail-desc">'+a.desc+'</div></div><span class="dir-bap">BAP &rarr; BPP</span></div>'+
    '<div class="payload-tabs"><button class="ptab2'+(activeTab==='req'?' active':'')+'" onclick="setTab(\'req\')">request</button><button class="ptab2'+(activeTab==='res'?' active':'')+'" onclick="setTab(\'res\')">response</button><button class="ptab2'+(activeTab==='attrs'?' active':'')+'" onclick="setTab(\'attrs\')">attributes</button><button class="copy-btn" onclick="copyP()">Copy</button></div>'+
    content;
}

function setPhase(p){activePhase=p;selectedApi=null;renderPhaseTabs();renderApiList();renderDetail();}
function selectApi(id){const all=[...apis['pre-order'],...apis['post-order']];selectedApi=all.find(a=>a.id===id);activeTab='req';renderApiList();renderDetail();}
function setTab(t){activeTab=t;renderDetail();}
function copyP(){
  if(!selectedApi)return;
  const p=activeTab==='req'?selectedApi.req:selectedApi.res;
  if(p)navigator.clipboard.writeText(JSON.stringify(p,null,2)).catch(()=>{});
  const btn=document.querySelector('.copy-btn');
  if(btn){btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy',1500);}
}

renderPhaseTabs();renderApiList();renderDetail();
</script>
</body>
</html>
